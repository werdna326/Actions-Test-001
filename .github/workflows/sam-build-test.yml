name: SAM Build Cache Test

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        function: [Function1, Function2, Function3, Function4, Function5]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '21'
          cache: 'maven'

      - name: Run Unit Test for ${{ matrix.function }}
        run: mvn test -f "functions/${{ matrix.function }}/pom.xml"

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '21'
          cache: 'maven'

      - name: Cache SAM build directory
        uses: actions/cache@v5
        with:
          path: .aws-sam
          key: ${{ runner.os }}-sam-build-${{ hashFiles('.github/workflows/sam-build-test.yml', '.samignore', 'template.yaml', 'functions/**/pom.xml', 'functions/**/src/**') }}
          restore-keys: |
            ${{ runner.os }}-sam-build-

      - name: Build SAM application (Parallel functions)
        run: |
          # 全関数のクリーンアップ。sam build --cached のための準備
          for dir in functions/*; do
            if [ -d "$dir" ]; then
              mvn clean -f "$dir/pom.xml"
            fi
          done
          sam build --cached --parallel
        env:
            MAVEN_OPTS: "-Dmaven.test.skip=true"