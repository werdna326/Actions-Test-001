name: SAM Build Cache Test

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '21'
          cache: 'maven'

      - name: Run Unit Tests
        run: |
          for dir in functions/*; do
            if [ -d "$dir" ]; then
              echo "Testing $dir..."
              mvn test -f "$dir/pom.xml"
            fi
          done

      - name: Cache SAM build directory
        uses: actions/cache@v5
        with:
          path: .aws-sam
          key: ${{ runner.os }}-sam-build-${{ hashFiles('.github/workflows/sam-build-test.yml', '.samignore', 'template.yaml', 'functions/**/pom.xml', 'functions/**/src/**') }}
          restore-keys: |
            ${{ runner.os }}-sam-build-

      - name: Build SAM application (Parallel functions)
        run: |
          for dir in functions/*; do
            if [ -d "$dir" ]; then
              mvn clean -f "$dir/pom.xml"
            fi
          done
          sam build --cached --parallel
        env:
            MAVEN_OPTS: "-Dmaven.test.skip=true"