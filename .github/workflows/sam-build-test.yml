name: SAM Build Cache Test

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '21'
          cache: 'maven'

      - name: Run Unit Tests
        run: mvn test
        working-directory: HelloWorldFunction

      - name: Cache SAM build directory
        uses: actions/cache@v5
        with:
          path: .aws-sam
          # ワークフローファイル自体や .samignore が変更された際にも自動でキャッシュを破棄（再作成）するように監視対象に追加しました
          key: ${{ runner.os }}-sam-build-${{ hashFiles('.github/workflows/sam-build-test.yml', '.samignore', 'template.yaml', 'HelloWorldFunction/pom.xml', 'HelloWorldFunction/src/**') }}
          restore-keys: |
            ${{ runner.os }}-sam-build-

      - name: Build SAM application (Parallel functions)
        env:
          MAVEN_OPTS: "-DskipTests"
        # SAMの仕様で .samignore がキャッシュのハッシュ計算に効かない問題があるため、ビルド直前に不要な一時ファイルを一度消し飛ばすようにします
        run: |
          mvn clean -f HelloWorldFunction/pom.xml
          sam build --cached --parallel --debug
